{% extends "base.html" %} {% block content %}
<header class="mb-16">
  <h1 class="text-4xl font-bold text-white mb-4 tracking-tight">
    Selected Works
  </h1>
  <p class="text-gray-500 max-w-2xl">
    Full-stack engineering and DevOps focus.
  </p>
</header>

<div class="grid grid-cols-1 md:grid-cols-2 gap-12">
  {% for project in projects %}
  <a href="/project/{{ project.id }}" class="group block">
    <div
      class="aspect-video bg-gray-900 overflow-hidden mb-4 border border-gray-800 transition-all group-hover:border-gray-500"
    >
      <!-- Placeholder for project video or image -->
      {% if project.thumbnail %}
      <img
        src="{{ project.thumbnail }}"
        alt="{{ project.title }}"
        class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500"
      />
      {% else %}
      <div
        class="w-full h-full flex items-center justify-center text-gray-700 text-xs tracking-tighter"
      >
        PREVIEW_NOT_FOUND
      </div>
      {% endif %}
    </div>
    <h2
      class="text-lg font-medium text-white group-hover:underline decoration-1 underline-offset-4"
    >
      {{ project.title }}
    </h2>
    <p class="text-sm text-gray-500 mt-1 line-clamp-2">
      {{ project.description }}
    </p>
  </a>
  {% endfor %}
</div>
{% endblock %}
