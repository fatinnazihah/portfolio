<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio | Lead Frontend Dev</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/css">
      /* Custom scrollbar to match minimalist dark theme */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1a1a1a;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #444;
      }
    </style>
  </head>
  <body
    class="bg-black text-gray-300 font-sans selection:bg-white selection:text-black"
  >
    <!-- Navigation -->
    <nav class="border-b border-gray-800 py-6">
      <div class="max-w-5xl mx-auto px-4 flex justify-between items-center">
        <a
          href="/"
          class="text-xl font-bold tracking-tighter text-white hover:opacity-80 transition-opacity"
        >
          PORTFOLIO
        </a>
        <div class="space-x-8 text-sm uppercase tracking-widest">
          <a href="/" class="hover:text-white transition-colors">Projects</a>
          <a
            href="/add"
            class="hover:text-white transition-colors text-gray-500"
            >Admin</a
          >
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-4 py-12">
      {% block content %}{% endblock %}
    </main>

    <!-- Replace the existing footer in base.html with this -->
    <footer class="border-t border-gray-900 py-16 mt-12">
      <div
        class="max-w-5xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-8"
      >
        <div
          class="text-xs text-gray-600 uppercase tracking-widest text-center md:text-left"
        >
          &copy; 2026 | Fatin Nazihah
        </div>

        <!-- Professional Links -->
        <div
          class="flex gap-8 text-[10px] uppercase tracking-[0.2em] text-gray-400"
        >
          <a
            href="https://github.com/fatinnazihah/"
            target="_blank"
            class="hover:text-white transition-colors"
            >GitHub</a
          >
          <a
            href="https://linkedin.com/in/fatin-nazihah-abdul-rahman-74b9a8274/"
            target="_blank"
            class="hover:text-white transition-colors"
            >LinkedIn</a
          >
          <a
            href="mailto:fatinnazihah65@gmail.com"
            class="hover:text-white transition-colors"
            >Contact</a
          >
        </div>
      </div>
    </footer>
  </body>
</html>
