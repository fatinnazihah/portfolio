{% extends "base.html" %} {% block content %}
<div class="max-w-3xl mx-auto">
  <a
    href="/"
    class="text-xs text-gray-500 hover:text-white mb-8 inline-block transition-colors uppercase tracking-widest"
    >← Back to index</a
  >

  <h1 class="text-5xl font-bold text-white mb-6 tracking-tighter">
    {{ project.title }}
  </h1>

  <div class="flex flex-wrap gap-2 mb-12">
    {% for tag in project.tags.split(',') %}
    <span
      class="px-3 py-1 bg-gray-900 border border-gray-800 text-[10px] text-gray-400 uppercase tracking-widest"
      >{{ tag.strip() }}</span
    >
    {% endfor %}
  </div>

  <!-- Project Video/Content -->
  <div
    class="bg-gray-900 aspect-video mb-12 border border-gray-800 flex items-center justify-center"
  >
    <span class="text-gray-700 uppercase tracking-widest text-xs"
      >Project Video Player</span
    >
  </div>

  <div class="prose prose-invert max-w-none">
    <h3 class="text-white text-lg font-semibold mb-4">Overview</h3>
    <p class="text-gray-400 leading-relaxed">{{ project.description }}</p>
  </div>
</div>
{% endblock %}
