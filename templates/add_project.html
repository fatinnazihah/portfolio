{% extends "base.html" %} {% block content %}
<div class="max-w-xl mx-auto">
  <h1 class="text-2xl font-bold text-white mb-8 tracking-tight">
    {{ "Edit" if edit else "Add" }} Project
  </h1>

  <form
    action="{{ url_for('edit_project', id=project.id) if edit else '/add' }}"
    method="POST"
    class="space-y-6"
  >
    <div>
      <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2"
        >Project Title</label
      >
      <input
        type="text"
        name="title"
        value="{{ project.title if edit else '' }}"
        required
        class="w-full bg-black border border-gray-800 p-3 text-white focus:outline-none focus:border-white transition-colors"
      />
    </div>

    <div>
      <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2"
        >Description</label
      >
      <textarea
        name="description"
        rows="5"
        required
        class="w-full bg-black border border-gray-800 p-3 text-white focus:outline-none focus:border-white transition-colors"
      >
{{ project.description if edit else '' }}</textarea
      >
    </div>

    <!-- Image URL Field (The missing link for previews) -->
    <div>
      <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2"
        >Thumbnail Image URL</label
      >
      <input
        type="text"
        name="image_url"
        value="{{ project.image_url if edit else '' }}"
        placeholder="e.g. /static/img/project1.png or https://..."
        class="w-full bg-black border border-gray-800 p-3 text-white focus:outline-none focus:border-white transition-colors"
      />
    </div>

    <div>
      <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2"
        >Tags (Comma separated)</label
      >
      <input
        type="text"
        name="tags"
        value="{{ project.technologies if edit else '' }}"
        placeholder="Python, Docker, FastAPI"
        class="w-full bg-black border border-gray-800 p-3 text-white focus:outline-none focus:border-white transition-colors"
      />
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label
          class="block text-xs uppercase tracking-widest text-gray-500 mb-2"
          >GitHub URL</label
        >
        <input
          type="url"
          name="github_url"
          value="{{ project.github_url if edit else '' }}"
          class="w-full bg-black border border-gray-800 p-3 text-white focus:border-white transition-all outline-none"
        />
      </div>
      <div>
        <label
          class="block text-xs uppercase tracking-widest text-gray-500 mb-2"
          >YouTube URL</label
        >
        <input
          type="url"
          name="video_url"
          value="{{ project.video_url if edit else '' }}"
          class="w-full bg-black border border-gray-800 p-3 text-white focus:border-white transition-all outline-none"
        />
      </div>
    </div>

    <div>
      <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2"
        >Live Site URL</label
      >
      <input
        type="url"
        name="live_url"
        value="{{ project.live_url if edit else '' }}"
        class="w-full bg-black border border-gray-800 p-3 text-white focus:border-white transition-all outline-none"
      />
    </div>

    <button
      type="submit"
      class="w-full bg-white text-black font-bold py-3 uppercase text-xs tracking-widest hover:bg-gray-200 transition-colors"
    >
      {{ "Update" if edit else "Publish" }} Project
    </button>
  </form>
</div>
{% endblock %}
