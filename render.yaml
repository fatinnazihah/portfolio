databases:
  - name: portfolio-db
    databaseName: portfolio
    user: portfolio_user
    plan: free

services:
  - type: web
    name: portfolio-site
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
